<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Заказ муки — Darad</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f9fafb; color: #111827; padding: 16px; }
  .wrap { max-width: 480px; margin: 0 auto; }
  .card { background: #fff; border: 1px solid #f3f4f6; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
  h1 { font-size: 22px; font-weight: 900; }
  .sub { color: #9ca3af; font-size: 13px; margin-top: 2px; }
  .pos { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f3f4f6; }
  .pos:last-child { border-bottom: 0; }
  .pname { font-weight: 600; font-size: 15px; }
  .pprice { color: #6b7280; font-size: 12px; margin-top: 2px; }
  .qty { display: flex; align-items: center; gap: 6px; }
  .qty button { width: 38px; height: 38px; border: 0; border-radius: 10px; background: #f3f4f6; font-size: 20px; font-weight: 700; color: #374151; }
  .qty button:active { background: #e5e7eb; }
  .qty input { width: 54px; height: 38px; text-align: center; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 16px; font-weight: 700; }
  label { font-size: 13px; font-weight: 600; color: #374151; display: block; margin-bottom: 4px; }
  input[type=date], textarea { width: 100%; border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px; font-size: 15px; font-family: inherit; }
  textarea { resize: none; }
  .total { display: flex; justify-content: space-between; font-weight: 800; font-size: 16px; padding-top: 10px; }
  .btn { width: 100%; padding: 14px; border: 0; border-radius: 14px; background: #f59e0b; color: #fff; font-size: 17px; font-weight: 800; margin-top: 4px; }
  .btn:disabled { opacity: .5; }
  .err { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 12px; padding: 12px; font-size: 14px; margin-bottom: 12px; display: none; }
  .ok { text-align: center; padding: 40px 16px; display: none; }
  .ok .big { font-size: 56px; }
  .ok h2 { font-size: 20px; margin: 10px 0 6px; }
  .ok p { color: #6b7280; font-size: 14px; }
  .loading { text-align: center; color: #9ca3af; padding: 40px 0; }
</style>
</head>
<body>
<div class="wrap">
  <div id="loading" class="loading">Загружаю прайс…</div>
  <div id="err" class="err"></div>
  <div id="form" style="display:none">
    <div class="card">
      <h1>🌾 Заказ муки</h1>
      <div class="sub" id="clientName"></div>
    </div>
    <div class="card" id="positions"></div>
    <div class="card">
      <div style="margin-bottom:10px">
        <label>Дата доставки</label>
        <input type="date" id="date">
      </div>
      <label>Комментарий (по желанию)</label>
      <textarea id="note" rows="2" placeholder="например: с отлёжкой, позвонить перед приездом"></textarea>
      <div class="total"><span>Итого:</span><span id="total">0 кг</span></div>
      <div id="editHint" style="display:none;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:8px 10px;font-size:13px;color:#92400e;margin-bottom:6px">✏️ Редактируешь заявку на <b id="editDateTxt"></b> — после сохранения старая будет заменена. <a href="#" id="editCancel" style="color:#b45309">Отменить редактирование</a></div>
      <button class="btn" id="send" disabled>Отправить заявку</button>
    </div>
    <div class="card" id="histCard" style="display:none">
      <h2 style="font-size:16px;font-weight:800;margin-bottom:8px">📋 Мои заказы</h2>
      <div id="history"></div>
    </div>
  </div>
  <div id="ok" class="ok card">
    <div class="big">✅</div>
    <h2>Заявка отправлена!</h2>
    <p id="okText"></p>
    <p style="margin-top:8px">Мы получили заказ и свяжемся, если будут вопросы.</p>
    <button class="btn" style="margin-top:16px" onclick="location.reload()">← Вернуться к заказам</button>
  </div>
</div>
<script>
(function () {
  var qs = new URLSearchParams(location.search);
  var c = qs.get("c"), k = qs.get("k");
  var products = [];
  var fmt = function (n) { return Math.round(n).toLocaleString("ru-RU"); };
  var $ = function (id) { return document.getElementById(id); };
  function showErr(t) { $("loading").style.display = "none"; var e = $("err"); e.textContent = "⚠️ " + t; e.style.display = "block"; }
  function api(body) {
    return fetch("/api/client-order", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(Object.assign({ c: c, k: k }, body)) })
      .then(function (r) { return r.json().then(function (d) { if (!r.ok) throw new Error(d.error || "Ошибка"); return d; }); });
  }
  function recalc() {
    var kg = 0, sum = 0, any = false;
    products.forEach(function (p, i) {
      var q = Math.max(0, Math.round(Number($("q" + i).value) || 0));
      if (q > 0) { any = true; kg += q * p.bag_kg; sum += q * p.price_bag; }
    });
    $("total").textContent = fmt(kg) + " кг" + (sum ? " · " + fmt(sum) + " тг" : "");
    $("send").disabled = !any;
  }
  function step(i, d) { var el = $("q" + i); el.value = Math.max(0, (Math.round(Number(el.value) || 0)) + d); recalc(); }
  window.__step = step; window.__recalc = recalc;

  var editDate = null; // дата заявки, которую редактируем (null = новый заказ)
  function setEdit(d) {
    editDate = d;
    $("editHint").style.display = d ? "block" : "none";
    if (d) $("editDateTxt").textContent = d.split("-").reverse().join(".");
    $("send").textContent = d ? "Сохранить изменения" : "Отправить заявку";
  }
  function fmtD(d) { return (d || "").split("-").reverse().join("."); }
  function statusOf(list) {
    if (list.every(function (o) { return o.status === "отгружена"; })) return ["✅ доставлена", "#059669"];
    if (list.some(function (o) { return o.status === "в пути"; })) return ["🚚 в пути", "#b45309"];
    return ["🕐 ждёт отправки", "#6b7280"];
  }
  function loadHistory() {
    api({ action: "history" }).then(function (d) {
      var orders = d.orders || [];
      if (!orders.length) { $("histCard").style.display = "none"; return; }
      var byDate = {};
      orders.forEach(function (o) { (byDate[o.date] = byDate[o.date] || []).push(o); });
      var html = "";
      Object.keys(byDate).sort(function (a, b) { return b.localeCompare(a); }).forEach(function (d2) {
        var list = byDate[d2];
        var st = statusOf(list);
        var cancellable = list.every(function (o) { return o.from_client && o.status === "новая"; });
        html += '<div style="border:1px solid #f3f4f6;border-radius:12px;padding:10px;margin-bottom:8px">'
          + '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px"><b style="font-size:14px">на ' + fmtD(d2) + '</b><span style="font-size:12px;font-weight:700;color:' + st[1] + '">' + st[0] + "</span></div>";
        list.forEach(function (o) { html += '<div style="font-size:13px;color:#4b5563;margin-top:3px">• ' + o.brand + " " + o.grade + " " + o.bag_kg + "кг × " + o.bags + " меш.</div>"; });
        if (cancellable) html += '<div style="display:flex;gap:8px;margin-top:8px">'
          + '<button onclick="__edit(\'' + d2 + '\')" style="flex:1;padding:8px;border:0;border-radius:9px;background:#f3f4f6;font-weight:700;font-size:13px">✏️ Изменить</button>'
          + '<button onclick="__cancel(\'' + d2 + '\')" style="flex:1;padding:8px;border:0;border-radius:9px;background:#fef2f2;color:#dc2626;font-weight:700;font-size:13px">✕ Отменить</button></div>';
        html += "</div>";
      });
      $("history").innerHTML = html;
      $("histCard").style.display = "block";
      window.__histData = byDate;
    }).catch(function () {});
  }
  window.__cancel = function (d2) {
    if (!confirm("Отменить заявку на " + fmtD(d2) + "?")) return;
    api({ action: "cancel", date: d2 }).then(function () { if (editDate === d2) setEdit(null); loadHistory(); alert("✓ Заявка отменена"); })
      .catch(function (e) { alert("⚠️ " + e.message); });
  };
  window.__edit = function (d2) {
    var list = (window.__histData || {})[d2] || [];
    products.forEach(function (p, i) {
      var match = list.find(function (o) { return o.brand === p.brand && o.grade === p.grade && Number(o.bag_kg) === Number(p.bag_kg); });
      $("q" + i).value = match ? match.bags : 0;
    });
    $("date").value = d2;
    $("note").value = (list.find(function (o) { return o.note; }) || {}).note || "";
    setEdit(d2);
    recalc();
    window.scrollTo({ top: 0, behavior: "smooth" });
  };
  if (!c || !k) { showErr("Неверная ссылка. Попроси у поставщика новую."); return; }
  var tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
  api({ action: "info" }).then(function (d) {
    products = d.products || [];
    $("clientName").textContent = "для: " + d.name;
    if (!products.length) { showErr("В вашей карточке пока нет прайса — позвоните поставщику."); return; }
    var html = "";
    products.forEach(function (p, i) {
      html += '<div class="pos"><div><div class="pname">' + p.brand + " " + p.grade + ", мешок " + p.bag_kg + ' кг</div>'
        + (p.price_bag ? '<div class="pprice">' + fmt(p.price_bag) + " тг за мешок</div>" : "")
        + '</div><div class="qty"><button onclick="__step(' + i + ',-1)">−</button><input id="q' + i + '" type="number" inputmode="numeric" value="0" onchange="__recalc()" oninput="__recalc()"><button onclick="__step(' + i + ',1)">+</button></div></div>';
    });
    $("positions").innerHTML = html;
    $("date").value = tomorrow.toISOString().slice(0, 10);
    $("loading").style.display = "none";
    $("form").style.display = "block";
    $("editCancel").addEventListener("click", function (ev) { ev.preventDefault(); setEdit(null); products.forEach(function (_, i) { $("q" + i).value = 0; }); recalc(); });
    loadHistory();
  }).catch(function (e) { showErr(e.message); });
  $("send").addEventListener("click", function () {
    var items = [];
    products.forEach(function (p, i) {
      var q = Math.max(0, Math.round(Number($("q" + i).value) || 0));
      if (q > 0) items.push({ brand: p.brand, grade: p.grade, bag_kg: p.bag_kg, bags: q });
    });
    if (!items.length) return;
    $("send").disabled = true; $("send").textContent = "Отправляю…";
    api({ action: "submit", items: items, date: $("date").value, note: $("note").value, replaceDate: editDate || "" })
      .then(function (d) {
        $("form").style.display = "none";
        $("okText").textContent = (editDate ? "Заявка изменена. " : "") + "Позиций: " + d.created + " · дата доставки: " + d.date.split("-").reverse().join(".");
        $("ok").style.display = "block";
      })
      .catch(function (e) { $("send").disabled = false; $("send").textContent = editDate ? "Сохранить изменения" : "Отправить заявку"; var er = $("err"); er.textContent = "⚠️ " + e.message; er.style.display = "block"; });
  });
})();
</script>
</body>
</html>
